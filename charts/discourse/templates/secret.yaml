{{- if include "discourse.createSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "discourse.fullname" . }}
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.postgresql.existingSecret }}
  DISCOURSE_DB_USERNAME: {{ .Values.postgresql.username | quote }}
  DISCOURSE_DB_PASSWORD: {{ .Values.postgresql.password | quote }}
  {{- end }}
  {{- if not .Values.discourse.smtp.existingSecret }}
  DISCOURSE_SMTP_USER_NAME: {{ .Values.discourse.smtp.username | quote }}
  DISCOURSE_SMTP_PASSWORD: {{ .Values.discourse.smtp.password | quote }}
  {{- end }}
  {{- if not .Values.redis.existingSecret }}
  DISCOURSE_REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- if not .Values.discourse.s3.existingSecret }}
  DISCOURSE_S3_ACCESS_KEY_ID: {{ .Values.discourse.s3.accessKeyId | quote }}
  DISCOURSE_S3_SECRET_ACCESS_KEY: {{ .Values.discourse.s3.secretAccessKey | quote }}
  {{- end }}
{{- end }}
