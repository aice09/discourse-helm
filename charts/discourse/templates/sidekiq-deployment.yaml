{{- if .Values.sidekiq.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discourse.fullname" . }}-sidekiq
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
    app.kubernetes.io/component: sidekiq
spec:
  replicas: {{ .Values.sidekiq.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "discourse.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: sidekiq
  template:
    metadata:
      annotations:
        {{- toYaml .Values.sidekiq.podAnnotations | nindent 8 }}
      labels:
        app.kubernetes.io/name: {{ include "discourse.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: sidekiq
    spec:
      serviceAccountName: {{ include "discourse.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.discourse.pluginInit.enabled .Values.discourse.plugins }}
      initContainers:
        - name: install-plugins
          image: "{{ .Values.discourse.pluginInit.image.repository }}:{{ .Values.discourse.pluginInit.image.tag }}"
          imagePullPolicy: {{ .Values.discourse.pluginInit.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /plugins
              while read -r plugin; do
                [ -z "$plugin" ] && continue
                git clone --depth 1 "$plugin" "/plugins/$(basename "$plugin" .git)"
              done < /plugin-config/plugins.txt
          volumeMounts:
            - name: discourse-plugins
              mountPath: /plugins
            - name: plugin-config
              mountPath: /plugin-config
      {{- end }}
      containers:
        - name: sidekiq
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.sidekiq.command | nindent 12 }}
          envFrom:
            {{- include "discourse.envFrom" . | nindent 12 }}
          env:
            {{- include "discourse.secretEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.sidekiq.resources | nindent 12 }}
          volumeMounts:
            - name: discourse-data
              mountPath: /shared
            {{- if and .Values.discourse.pluginInit.enabled .Values.discourse.plugins }}
            - name: discourse-plugins
              mountPath: /var/www/discourse/plugins
            {{- end }}
      volumes:
        {{- if and .Values.discourse.pluginInit.enabled .Values.discourse.plugins }}
        - name: discourse-plugins
          emptyDir: {}
        - name: plugin-config
          configMap:
            name: {{ include "discourse.fullname" . }}
            items:
              - key: plugins.txt
                path: plugins.txt
        {{- end }}
        - name: discourse-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "discourse.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.sidekiq.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sidekiq.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sidekiq.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
