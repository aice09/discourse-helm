apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discourse.fullname" . }}
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "discourse.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "discourse.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "discourse.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.discourse.pluginInit.enabled .Values.discourse.plugins }}
      initContainers:
        - name: install-plugins
          image: "{{ .Values.discourse.pluginInit.image.repository }}:{{ .Values.discourse.pluginInit.image.tag }}"
          imagePullPolicy: {{ .Values.discourse.pluginInit.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /plugins
              while read -r plugin; do
                [ -z "$plugin" ] && continue
                git clone --depth 1 "$plugin" "/plugins/$(basename "$plugin" .git)"
              done < /plugin-config/plugins.txt
          volumeMounts:
            - name: discourse-plugins
              mountPath: /plugins
            - name: plugin-config
              mountPath: /plugin-config
      {{- end }}
      containers:
        - name: discourse
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "discourse.fullname" . }}
            {{- if include "discourse.createSecret" . }}
            - secretRef:
                name: {{ include "discourse.fullname" . }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DISCOURSE_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.fullname" .) .Values.postgresql.existingSecret }}
                  key: {{ ternary .Values.postgresql.usernameKey "DISCOURSE_DB_USERNAME" (ne .Values.postgresql.existingSecret "") }}
            - name: DISCOURSE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.fullname" .) .Values.postgresql.existingSecret }}
                  key: {{ ternary .Values.postgresql.passwordKey "DISCOURSE_DB_PASSWORD" (ne .Values.postgresql.existingSecret "") }}
            - name: DISCOURSE_SMTP_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.fullname" .) .Values.discourse.smtp.existingSecret }}
                  key: {{ ternary .Values.discourse.smtp.usernameKey "DISCOURSE_SMTP_USER_NAME" (ne .Values.discourse.smtp.existingSecret "") }}
            - name: DISCOURSE_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.fullname" .) .Values.discourse.smtp.existingSecret }}
                  key: {{ ternary .Values.discourse.smtp.passwordKey "DISCOURSE_SMTP_PASSWORD" (ne .Values.discourse.smtp.existingSecret "") }}
            - name: DISCOURSE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.fullname" .) .Values.redis.existingSecret }}
                  key: {{ ternary .Values.redis.passwordKey "DISCOURSE_REDIS_PASSWORD" (ne .Values.redis.existingSecret "") }}
            - name: DISCOURSE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.fullname" .) .Values.discourse.s3.existingSecret }}
                  key: {{ ternary .Values.discourse.s3.accessKeyIdKey "DISCOURSE_S3_ACCESS_KEY_ID" (ne .Values.discourse.s3.existingSecret "") }}
            - name: DISCOURSE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "discourse.fullname" .) .Values.discourse.s3.existingSecret }}
                  key: {{ ternary .Values.discourse.s3.secretAccessKeyKey "DISCOURSE_S3_SECRET_ACCESS_KEY" (ne .Values.discourse.s3.existingSecret "") }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /srv/status
              port: http
          livenessProbe:
            httpGet:
              path: /srv/status
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: discourse-data
              mountPath: /shared
            {{- if and .Values.discourse.pluginInit.enabled .Values.discourse.plugins }}
            - name: discourse-plugins
              mountPath: /var/www/discourse/plugins
            {{- end }}
      volumes:
        {{- if and .Values.discourse.pluginInit.enabled .Values.discourse.plugins }}
        - name: discourse-plugins
          emptyDir: {}
        - name: plugin-config
          configMap:
            name: {{ include "discourse.fullname" . }}
            items:
              - key: plugins.txt
                path: plugins.txt
        {{- end }}
        - name: discourse-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "discourse.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
