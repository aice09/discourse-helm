replicaCount: 1

image:
  repository: discourse/discourse
  tag: "2026.7.0-latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: discourse.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

extraEnv: []
extraEnvFrom: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

discourse:
  hostname: discourse.local
  developerEmails: "admin@example.com"
  smtp:
    address: ""
    port: 587
    username: ""
    password: ""
    existingSecret: ""
    usernameKey: smtp-username
    passwordKey: smtp-password
    authentication: login
    enableStartTls: true
  plugins: []
  pluginInit:
    enabled: false
    image:
      repository: alpine/git
      tag: "2.45.2"
      pullPolicy: IfNotPresent
  s3:
    enabled: false
    bucket: ""
    region: ""
    endpoint: ""
    accessKeyId: ""
    secretAccessKey: ""
    existingSecret: ""
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key

postgresql:
  enabled: false
  host: discourse-postgres-rw
  port: 5432
  database: discourse
  username: discourse
  password: ""
  existingSecret: ""
  usernameKey: username
  passwordKey: password

redis:
  enabled: false
  host: discourse-redis-master
  port: 6379
  password: ""
  existingSecret: ""
  passwordKey: password

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

web:
  command: []
  args: []

sidekiq:
  enabled: true
  replicaCount: 1
  command:
    - /bin/bash
    - -lc
  args:
    - bundle exec sidekiq -C config/sidekiq.yml
  resources: {}

migrationJob:
  enabled: true
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  command:
    - /bin/bash
    - -lc
  args:
    - bundle exec rake db:migrate

startupJob:
  enabled: false
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  command:
    - /bin/bash
    - -lc
  args:
    - bundle exec rake assets:precompile

cronJobs:
  backup:
    enabled: false
    schedule: "0 3 * * *"
    command:
      - /bin/bash
      - -lc
    args:
      - bundle exec rake backups:create
  maintenance:
    enabled: false
    schedule: "30 3 * * 0"
    command:
      - /bin/bash
      - -lc
    args:
      - bundle exec rake db:migrate

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress: []
  egress: []

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

rbac:
  create: false
  rules: []
