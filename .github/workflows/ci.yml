name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/discourse
      - run: helm template discourse charts/discourse -f examples/minimal/values.yaml
